{% extends 'base.html' %}

{% block title %}Sign Up — MyBlog{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">

          <h3 class="fw-bold mb-1">Create Account</h3>
          <p class="text-muted mb-4">Join MyBlog today</p>

          <form method="post">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control" placeholder="Choose a username" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" name="email" class="form-control" placeholder="Enter your email" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password1" class="form-control" placeholder="Choose a password" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Confirm Password</label>
              <input type="password" name="password2" class="form-control" placeholder="Repeat your password" required />
            </div>

            {% if form.errors %}
              <div class="alert alert-danger py-2">
                {{ form.errors }}
              </div>
            {% endif %}

            <button type="submit" class="btn btn-dark w-100">Create Account</button>
          </form>

          <p class="text-center mt-3 mb-0 text-muted small">
            Already have an account? <a href="{% url 'login' %}">Login</a>
          </p>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

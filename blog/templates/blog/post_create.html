{% extends 'base.html' %}

{% block title %}Create Post — MyBlog{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body p-4">

          <h3 class="fw-bold mb-1">Create New Post</h3>
          <p class="text-muted mb-4">Share your thoughts with the world</p>

          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label fw-semibold">Title</label>
              <input type="text" name="title" class="form-control" placeholder="Enter post title" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Content</label>
              <textarea name="content" class="form-control" rows="8" placeholder="Write your post content here..." required></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Image (optional)</label>
              <input type="file" name="image" class="form-control" accept="image/*" />
            </div>

            {% if form.errors %}
              <div class="alert alert-danger py-2">
                {{ form.errors }}
              </div>
            {% endif %}

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-dark">Publish Post</button>
              <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}{{ post.title }} — MyBlog{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      {% if post.image %}
        <img src="{{ post.image.url }}" class="img-fluid rounded mb-4 w-100" style="max-height:400px;object-fit:cover;" alt="{{ post.title }}" />
      {% endif %}

      <h1 class="fw-bold mb-2">{{ post.title }}</h1>

      <p class="text-muted small mb-4">
        <i class="bi bi-person"></i> {{ post.author.username }} &nbsp;|&nbsp;
        <i class="bi bi-calendar3"></i> {{ post.created_at|date:"M d, Y" }}
      </p>

      <hr />

      <div class="mt-3" style="line-height:1.9;font-size:1.05rem;">
        {{ post.content|linebreaks }}
      </div>

      <hr class="mt-5" />
      <a href="{% url 'home' %}" class="btn btn-dark">
        <i class="bi bi-arrow-left"></i> Back to Home
      </a>

    </div>
  </div>
</div>
{% endblock %}
